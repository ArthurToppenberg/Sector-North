<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sector-North</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000000;
        overflow: hidden;
      }
      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      /* Boot loader: a white spinner on the black backdrop, shown from first
         paint until the scene signals it has created (world projected + toolbar
         SVG loaded), then removed by main.ts. White/black only, per HUD rule. */
      #loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #loader::after {
        content: '';
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
      }
      @keyframes loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div id="loader" role="status" aria-label="Loading"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
